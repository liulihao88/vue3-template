<!doctype html>

    ✓ default branding (colors, fonts, layout)
    ✓ Seed navigation section (always include this)
    ✓ Self-contained artifact (everything inline)

    WHAT TO CREATIVELY EDIT:
    ✗ The p5.js algorithm (implement YOUR vision)
    ✗ The parameters (define what YOUR art needs)
    ✗ The UI controls (match YOUR parameters)

    Let your philosophy guide the implementation.

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generative Art Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>


      /* Responsive - Stack on mobile */
      @media (width <= 600px) {
        .container {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
        }

        .canvas-area {
          padding: 20px;
        }
      }

      /* Brand Colors */
      :root {
        --brand-dark: #141413;
        --brand-light: #faf9f5;
        --brand-mid-gray: #b0aea5;
        --brand-light-gray: #e8e6dc;
        --brand-orange: #d97757;
        --brand-blue: #6a9bcc;
        --brand-green: #788c5d;
      }

      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
      }

      body {
        min-height: 100vh;
        font-family: Poppins, sans-serif;
        color: var(--brand-dark);
        background: linear-gradient(135deg, var(--brand-light) 0%, #f5f3ee 100%);
      }

      .container {
        display: flex;
        gap: 20px;
        min-height: 100vh;
        padding: 20px;
      }

      /* Sidebar */
      .sidebar {
        flex-shrink: 0;
        width: 320px;
        padding: 24px;
        overflow: hidden auto;
        background: rgb(255 255 255 / 95%);
        backdrop-filter: blur(10px);
        border-radius: 12px;
        box-shadow: 0 10px 30px rgb(20 20 19 / 10%);
      }

      .sidebar h1 {
        margin-bottom: 8px;
        font-family: Lora, serif;
        font-size: 24px;
        font-weight: 500;
        color: var(--brand-dark);
      }

      .sidebar .subtitle {
        margin-bottom: 32px;
        font-size: 14px;
        line-height: 1.4;
        color: var(--brand-mid-gray);
      }

      /* Control Sections */
      .control-section {
        margin-bottom: 32px;
      }

      .control-section h3 {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 16px;
        font-size: 16px;
        font-weight: 600;
        color: var(--brand-dark);
      }

      .control-section h3::before {
        font-weight: bold;
        color: var(--brand-orange);
        content: '•';
      }

      /* Seed Controls */
      .seed-input {
        width: 100%;
        padding: 12px;
        margin-bottom: 12px;
        font-family: 'Courier New', monospace;
        font-size: 14px;
        text-align: center;
        background: var(--brand-light);
        border: 1px solid var(--brand-light-gray);
        border-radius: 8px;
      }

      .seed-input:focus {
        background: white;
        border-color: var(--brand-orange);
        outline: none;
        box-shadow: 0 0 0 2px rgb(217 119 87 / 10%);
      }

      .seed-controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 8px;
      }

      .regen-button {
        margin-bottom: 0;
      }

      /* Parameter Controls */
      .control-group {
        margin-bottom: 20px;
      }

      .control-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 500;
        color: var(--brand-dark);
      }

      .slider-container {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .slider-container input[type='range'] {
        flex: 1;
        height: 4px;
        appearance: none;
        background: var(--brand-light-gray);
        border-radius: 2px;
        outline: none;
      }

      .slider-container input[type='range']::-webkit-slider-thumb {
        width: 16px;
        height: 16px;
        appearance: none;
        cursor: pointer;
        background: var(--brand-orange);
        border-radius: 50%;
        transition: all 0.2s ease;
      }

      .slider-container input[type='range']::-webkit-slider-thumb:hover {
        background: #c86641;
        transform: scale(1.1);
      }

      .slider-container input[type='range']::-moz-range-thumb {
        width: 16px;
        height: 16px;
        cursor: pointer;
        background: var(--brand-orange);
        border: none;
        border-radius: 50%;
        transition: all 0.2s ease;
      }

      .value-display {
        min-width: 60px;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        color: var(--brand-mid-gray);
        text-align: right;
      }

      /* Color Pickers */
      .color-group {
        margin-bottom: 16px;
      }

      .color-group label {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        color: var(--brand-mid-gray);
      }

      .color-picker-container {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .color-picker-container input[type='color'] {
        width: 32px;
        height: 32px;
        padding: 0;
        cursor: pointer;
        background: none;
        border: none;
        border-radius: 6px;
      }

      .color-value {
        font-family: 'Courier New', monospace;
        font-size: 12px;
        color: var(--brand-mid-gray);
      }

      /* Buttons */
      .button {
        width: 100%;
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 500;
        color: white;
        cursor: pointer;
        background: var(--brand-orange);
        border: none;
        border-radius: 6px;
        transition: all 0.2s ease;
      }

      .button:hover {
        background: #c86641;
        transform: translateY(-1px);
      }

      .button:active {
        transform: translateY(0);
      }

      .button.secondary {
        background: var(--brand-blue);
      }

      .button.secondary:hover {
        background: #5a8bb8;
      }

      .button.tertiary {
        background: var(--brand-green);
      }

      .button.tertiary:hover {
        background: #6b7b52;
      }

      .button-row {
        display: flex;
        gap: 8px;
      }

      .button-row .button {
        flex: 1;
      }

      /* Canvas Area */
      .canvas-area {
        display: flex;
        flex: 1;
        align-items: center;
        justify-content: center;
        min-width: 0;
      }

      #canvas-container {
        width: 100%;
        max-width: 1000px;
        overflow: hidden;
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 40px rgb(20 20 19 / 10%);
      }

      #canvas-container canvas {
        display: block;
        width: 100% !important;
        height: auto !important;
      }

      /* Loading State */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: var(--brand-mid-gray);
      }
    </style>
  </head>
  <body>

      <!-- Control Sidebar -->

        <!-- Headers (CUSTOMIZE THIS FOR YOUR ART) -->
        <h1>TITLE - EDIT</h1>

        <!-- Seed Section (ALWAYS KEEP THIS) -->
        <div class="control-section">
          <h3>Seed</h3>

          <div class="seed-controls">
            <button class="button secondary" onclick="previousSeed()">← Prev</button>
            <button class="button secondary" onclick="nextSeed()">Next →</button>

        <!-- Parameters Section (CUSTOMIZE THIS FOR YOUR ART) -->
        <div class="control-section">
          <h3>Parameters</h3>

          <!-- Particle Count -->
          <div class="control-group">
            <label>Particle Count</label>
            <div class="slider-container">
              <input
                type="range"
                id="particleCount"
                min="1000"
                max="10000"
                step="500"
                value="5000"
                oninput="updateParam('particleCount', this.value)"
              />
              <span class="value-display" id="particleCount-value">5000</span>
            </div>
          </div>

          <!-- Flow Speed -->
          <div class="control-group">
            <label>Flow Speed</label>
            <div class="slider-container">
              <input
                type="range"
                id="flowSpeed"
                min="0.1"
                max="2.0"
                step="0.1"
                value="0.5"
                oninput="updateParam('flowSpeed', this.value)"
              />
              <span class="value-display" id="flowSpeed-value">0.5</span>
            </div>
          </div>

          <!-- Noise Scale -->
          <div class="control-group">
            <label>Noise Scale</label>
            <div class="slider-container">
              <input
                type="range"
                id="noiseScale"
                min="0.001"
                max="0.02"
                step="0.001"
                value="0.005"
                oninput="updateParam('noiseScale', this.value)"
              />
              <span class="value-display" id="noiseScale-value">0.005</span>
            </div>
          </div>

          <!-- Trail Length -->
          <div class="control-group">
            <label>Trail Length</label>
            <div class="slider-container">
              <input
                type="range"
                id="trailLength"
                min="2"
                max="20"
                step="1"
                value="8"
                oninput="updateParam('trailLength', this.value)"
              />
              <span class="value-display" id="trailLength-value">8</span>
            </div>
          </div>
        </div>

        <!-- Colors Section (OPTIONAL - CUSTOMIZE OR REMOVE) -->
        <div class="control-section">
          <h3>Colors</h3>

          <!-- Color 1 -->
          <div class="color-group">
            <label>Primary Color</label>
            <div class="color-picker-container">
              <input type="color" id="color1" value="#d97757" onchange="updateColor('color1', this.value)" />
              <span class="color-value" id="color1-value">#d97757</span>
            </div>
          </div>

          <!-- Color 2 -->
          <div class="color-group">
            <label>Secondary Color</label>
            <div class="color-picker-container">
              <input type="color" id="color2" value="#6a9bcc" onchange="updateColor('color2', this.value)" />
              <span class="color-value" id="color2-value">#6a9bcc</span>
            </div>
          </div>

          <!-- Color 3 -->
          <div class="color-group">
            <label>Accent Color</label>
            <div class="color-picker-container">
              <input type="color" id="color3" value="#788c5d" onchange="updateColor('color3', this.value)" />
              <span class="color-value" id="color3-value">#788c5d</span>
            </div>
          </div>
        </div>

        <!-- Actions Section (ALWAYS KEEP THIS) -->
        <div class="control-section">
          <h3>Actions</h3>
          <div class="button-row">
            <button class="button" onclick="resetParameters()">Reset</button>
          </div>
        </div>
      </div>

      <!-- Main Canvas Area -->
      <div class="canvas-area">
        <div id="canvas-container">
          <div class="loading">Initializing generative art...</div>
        </div>
      </div>
    </div>

      // UI CONTROL HANDLERS - CUSTOMIZE FOR YOUR PARAMETERS

      // ═══════════════════════════════════════════════════════════════════════
      // SEED CONTROL FUNCTIONS - ALWAYS KEEP THESE
      // ═══════════════════════════════════════════════════════════════════════

      function updateSeedDisplay() {
        document.getElementById('seed-input').value = params.seed
      }

      function updateSeed() {
        let input = document.getElementById('seed-input')
        let newSeed = parseInt(input.value)
        if (newSeed && newSeed > 0) {
          params.seed = newSeed
          initializeSystem()
        } else {
          // Reset to current seed if invalid
          updateSeedDisplay()
        }
      }

      function previousSeed() {
        params.seed = Math.max(1, params.seed - 1)
        updateSeedDisplay()
        initializeSystem()
      }

      function nextSeed() {
        params.seed = params.seed + 1
        updateSeedDisplay()
        initializeSystem()
      }

      function randomSeedAndUpdate() {
        params.seed = Math.floor(Math.random() * 999999) + 1
        updateSeedDisplay()
        initializeSystem()
      }

      function resetParameters() {
        params = { ...defaultParams }

        // Update UI elements
        document.getElementById('particleCount').value = params.particleCount
        document.getElementById('particleCount-value').textContent = params.particleCount
        document.getElementById('flowSpeed').value = params.flowSpeed
        document.getElementById('flowSpeed-value').textContent = params.flowSpeed
        document.getElementById('noiseScale').value = params.noiseScale
        document.getElementById('noiseScale-value').textContent = params.noiseScale
        document.getElementById('trailLength').value = params.trailLength
        document.getElementById('trailLength-value').textContent = params.trailLength

        // Reset colors
        document.getElementById('color1').value = params.colorPalette[0]
        document.getElementById('color1-value').textContent = params.colorPalette[0]

        document.getElementById('color2-value').textContent = params.colorPalette[1]
        document.getElementById('color3').value = params.colorPalette[2]
        document.getElementById('color3-value').textContent = params.colorPalette[2]

      // Initialize UI on load

</html>
